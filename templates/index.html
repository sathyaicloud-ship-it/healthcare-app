<!DOCTYPE html>
<html>
<head>
    <title>Healthcare Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f8fb;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 700px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }
        h1 {
            color: #1d4ed8;
        }
        ul {
            line-height: 2;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Welcome to Healthcare Portal</h1>
        <p>Your secure healthcare management platform.</p>

        <h3>Services</h3>
        <ul>
            <li>Patient Registration</li>
            <li>Doctor Appointments</li>
            <li>Medical Reports</li>
            <li>Online Support</li>
        </ul>
    </div>
</body>
</html>
